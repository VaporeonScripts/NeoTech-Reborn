name: Bug report
description: Report a crash, bug, or issue with the modpack
labels: ["bug"]
assignees:
  - VaporeonScripts
body:
  - type: markdown
    attributes:
      value: |
        Please read before submitting:
        - If the issue is with a specific mod, consider reporting it to the mod author directly.
        - One issue per report. If you have multiple problems, open separate reports.
        - Common fix: update the pack to the latest version first.

  - type: dropdown
    id: tried_solutions
    attributes:
      label: Have you updated to the latest modpack version and tried without added/removed mods?
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Modpack version
      description: Check your launcher for the exact version
      placeholder: "e.g. 1.4.0.0"
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Java version
      description: "Tip: always use the latest Java 21 version"
      placeholder: "e.g. Java 21.0.11"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Was this on a singleplayer world or a server?
      options:
        - Singleplayer
        - Server
    validations:
      required: true

  - type: dropdown
    id: ram
    attributes:
      label: RAM allocated
      description: "Tip: allocate at least 12 GB to run the pack smoothly"
      options:
        - 8 GB
        - 10 GB
        - 12 GB
        - 14 GB
        - 16 GB
        - 20 GB
        - 24 GB
        - 28 GB
        - 32 GB
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Priority
      options:
        - Crashes the game
        - Major bug
        - Minor bug
        - Visual only
    validations:
      required: true

  - type: dropdown
    id: shaders
    attributes:
      label: Shaders or extra resource packs
      description: Are you using any shaders or resource packs not bundled with the pack?
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Describe the bug or crash
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can this be triggered again
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log file
      description: If this is a crash, please paste a link to your latest.log or crash report (use mclo.gs or a gist, don't paste the whole log here). Crashes are nearly impossible to diagnose without a log.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I've added or removed mods from the pack
          required: false
        - label: I checked existing issues and this hasn't been reported already
          required: true

  - type: textarea
    id: mod_changes
    attributes:
      label: Mods added or removed
      description: Only fill this in if you checked the box above. List which mods you added or removed.
    validations:
      required: false
