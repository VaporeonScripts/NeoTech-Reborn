#Enable No Startup Messages module
noStartupMessagesEnabled = true
#A list of word sequences that if contained in a message will be stopped.
noStartupMessagesMessages = ["Mekanism is currently in alpha", "Hello, thank you for downloading Terralith!", "If you wish to change settings", "It is recommended you download", "[Mekanism] Broken tags in Mekanism"]
#Disable recipe advancements
disableRecipeAdvancements = true
#Enable startup ding sound
enableDingDongStartupSound = true
#Name of sound to play. Default is entity.experience_orb.pickup
dingDongSound = "entity.experience_orb.pickup"
#Enable log supressor
logSuppressorEnabled = true
#A list of word sequences that if a log message starts with will be stopped.
logSuppressorStartsWithMessages = ["Encountered unknown"]
#A list of word sequences that if a log message ends with will be stopped.
logSuppressorEndsWithMessages = []
#A list of word sequences that if contained in a log message will be stopped.
logSuppressorContainsMessages = []
#A list of regex that if a log message matches it will be stopped. Don't use this if you don't know what you're doing.
logSuppressorRegexMessages = []
