# Lucid Gallery Configuration File
# Colors use ARGB Hexadecimal format (e.g., 0xAARRGGBB)

# Number of columns in the gallery grid
gridColumns=3
# Card background color (ARGB)
cardBackgroundColor=0xAA000000

# --- Scaling ---
# Custom GUI Scale (0 = Auto, 1-8 = Fixed)
customGuiScale=0
# Minimum virtual width for auto-scaling
scaleMinVirtualWidth=400
# Minimum virtual height for auto-scaling
scaleMinVirtualHeight=240

# --- Scrollbar ---
# Scrollbar track color
screenScrollbarTrackColor=0xAA1A1A1A
# Active scrollbar thumb color
screenScrollbarThumbActive=0xFF00FFAA
# Idle scrollbar thumb color
screenScrollbarThumbIdle=0xAA00FFAA
# Minimum scroll thumb height
screenMinScrollThumbHeight=24
# Scrollbar width
screenScrollbarWidth=3
# Scrollbar right margin
screenScrollbarRightMargin=12

# --- Screenshot Upload ---
# Enable the 'Upload' button in the screenshot preview (uploads to catbox.moe, no account needed)
screenshotUploadEnabled=true
# Minimum seconds between two uploads (anti-spam cooldown)
screenshotUploadCooldownSeconds=20

# --- Internal ---
# Config watcher (Needs Restart)
useConfigWatcher=false
