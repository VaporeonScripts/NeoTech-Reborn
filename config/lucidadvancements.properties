# Lucid Advancements Configuration File
# Colors use ARGB Hexadecimal format (e.g., 0xAARRGGBB)

# Interface scale behavior. 0 = Auto/Vanilla, 1-2 = Fixed Custom Scale Factor
customGuiScale=3

# --- HUD OVERLAY CONFIGURATION ---
# Background fill color for the pinned advancement boxes
overlayBgColor=0x880A0A0A
# Vertical strip color for normal advancements pinned to HUD
overlayNormalAccent=0xFF00FFAA
# Vertical strip color for challenge advancements pinned to HUD
overlayChallengeAccent=0xFFAA00FF
# Text color for normal advancement titles on HUD
overlayTitleColor=0xFFFFFFFF
# Text color for challenge advancement titles on HUD
overlayChallengeTitleColor=0xFFFF77FF

# --- ADVANCEMENT CARDS MENU CONFIGURATION
# Unobtained Normal Advancements ---
# Background color gradient start
cardNormalBg1=0xAA1A1A1A
# Background color gradient end
cardNormalBg2=0xAA121212
# Border color
cardNormalBorder=0x882A2A2A
# Title text color
cardNormalTitle=0xFFFFFFFF

# --- Unobtained Challenge/Rare Advancements ---
# Border color
cardRareBorder=0xAA42245A
# Title text color
cardRareTitle=0xFFB388CC

# --- Completed Normal Advancements ---
# Background color gradient start
cardObtainedBg1=0xBB142E1F
# Background color gradient end
cardObtainedBg2=0xBB0C1E14
# Border color
cardObtainedBorder=0xAA00FFAA
# Title text color
cardObtainedTitle=0xFF77FF77

# --- Completed Challenge/Rare Advancements ---
# Background color gradient start
cardObtainedRareBg1=0xBB2D1438
# Background color gradient end
cardObtainedRareBg2=0xBB1E0C26
# Border color
cardObtainedRareBorder=0xAAAA00FF
# Title text color
cardObtainedRareTitle=0xFFFF77FF
